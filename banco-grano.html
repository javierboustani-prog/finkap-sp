<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Banco de grano — Finkap</title>
<meta name="robots" content="noindex,nofollow">
<script src="supabase-cfg.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0f;--panel:#17171b;--panel2:#1d1d22;--panel3:#222228;
  --line:#2c2c33;--line2:#3a3a43;--text:#f5f5f7;--muted:#9b9ba6;--muted2:#6f6f7a;
  --orange:#F97316;--orange-d:#ea6a0c;--orange-soft:rgba(249,115,22,.12);--orange-line:rgba(249,115,22,.45);
  --ok:#46d39a;--blue:#7cc4ff;--violet:#b58bff;--red:#ff7a5a;--yellow:#f5c84b;
  --mono:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
  --sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:radial-gradient(1200px 600px at 85% -10%,rgba(249,115,22,.08),transparent 60%),var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;min-height:100vh}
a{color:inherit;text-decoration:none}
.mono{font-family:var(--mono);font-feature-settings:"tnum"}
.shell{max-width:1180px;margin:0 auto;padding:24px 20px 80px}
.top{display:flex;align-items:center;gap:14px;margin-bottom:8px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:22px;letter-spacing:-.03em}
.brand .dot{width:32px;height:32px;border-radius:50%;border:3px solid var(--orange);display:grid;place-items:center;color:var(--orange);font-weight:900;font-size:17px}
.h1{font-size:15px;color:var(--muted);font-weight:600}
.spacer{flex:1}
.btn{border:0;border-radius:10px;padding:9px 14px;font-weight:700;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:.15s;font-family:var(--sans)}
.btn.primary{background:var(--orange);color:#fff}.btn.primary:hover{background:var(--orange-d)}
.btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--muted)}.btn.ghost:hover{color:var(--text);border-color:var(--orange-line)}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:8px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.fld{width:100%;background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:10px 12px;color:var(--text);font-size:14px;font-family:var(--sans)}
.fld:focus{outline:0;border-color:var(--orange-line)}
.lbl{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted2);font-weight:700;margin-bottom:4px;display:block}
.login{max-width:380px;margin:8vh auto 0;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:30px}
.login h2{margin:0 0 4px;font-size:20px}.login p{margin:0 0 20px;color:var(--muted);font-size:13px}
.login .fld{margin-bottom:12px}
.err{color:var(--red);font-size:12.5px;margin-top:8px;min-height:16px}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:18px 0 14px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:6px 12px;border-radius:99px;border:1px solid var(--line2);background:var(--panel);color:var(--muted);font-size:12.5px;font-weight:600;cursor:pointer;transition:.14s}
.chip.on{background:var(--orange-soft);border-color:var(--orange-line);color:var(--orange)}
.chip .n{font-family:var(--mono);font-size:11px;opacity:.8;margin-left:5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.gc{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.gthumb{position:relative;height:220px;background:radial-gradient(120% 120% at 50% 0%,#2a1d12,#15110d 75%);overflow:hidden;cursor:zoom-in}
.gthumb .bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(22px) brightness(.42) saturate(1.15);transform:scale(1.18)}
.gthumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:10px;filter:drop-shadow(0 8px 20px rgba(0,0,0,.6))}
.gthumb .ld{position:absolute;inset:0;display:grid;place-items:center;color:var(--muted2);font-size:12px}
.gbadge{position:absolute;top:8px;right:8px;font-size:10px;font-weight:800;padding:4px 8px;border-radius:99px;backdrop-filter:blur(6px);z-index:2}
.b-certificado{background:rgba(70,211,154,.2);color:var(--ok)}
.b-provisorio{background:rgba(245,200,75,.2);color:var(--yellow)}
.b-rechazado,.b-no_viable{background:rgba(255,122,90,.2);color:var(--red)}
.gbody{padding:12px 14px;display:flex;flex-direction:column;gap:3px}
.gbody .nm{font-weight:700;font-size:14.5px}
.gbody .meta{font-size:12px;color:var(--muted)}
.gbody .row{display:flex;justify-content:space-between;align-items:baseline;margin-top:4px}
.gbody .sc{font-family:var(--mono);font-weight:700}
.gbody .pr{font-family:var(--mono);font-weight:700;color:var(--orange)}
.gbody .when{font-size:11px;color:var(--muted2);margin-top:2px}
.gbody .sello{font-family:var(--mono);font-size:10.5px;color:var(--muted2)}
.empty{text-align:center;color:var(--muted);padding:50px 20px;grid-column:1/-1}
.stat{display:inline-flex;gap:6px;align-items:baseline;font-size:13px;color:var(--muted)}
.stat b{font-family:var(--mono);font-size:16px;color:var(--text)}
.mask{position:fixed;inset:0;background:rgba(5,5,7,.85);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:24px}
.mask.show{display:flex}
.mask img{max-width:92vw;max-height:88vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#111;border:1px solid var(--line2);color:var(--text);padding:11px 18px;border-radius:11px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:60}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="loginView" class="login" style="display:none">
  <div class="brand" style="margin-bottom:18px"><span class="dot">f</span> finkap</div>
  <h2>Banco de grano</h2>
  <p>Acceso del equipo. Usá la cuenta de Finkap.</p>
  <label class="lbl">Email</label>
  <input id="liMail" class="fld" type="email" autocomplete="username" placeholder="equipo@finkap.net">
  <label class="lbl">Contraseña</label>
  <input id="liPass" class="fld" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="btn primary" style="width:100%;margin-top:6px" id="liBtn" onclick="doLogin()">Entrar</button>
  <label for="liRm" style="display:flex;align-items:center;gap:7px;margin-top:12px;color:#9b9ba6;font-size:12px;cursor:pointer;user-select:none">
    <input id="liRm" type="checkbox" checked style="width:15px;height:15px;accent-color:#F97316;cursor:pointer">Mantener sesión en este equipo</label>
  <div class="err" id="liErr"></div>
</div>

<!-- BANCO -->
<div id="bankView" class="shell" style="display:none">
  <div class="top">
    <a href="inicio.html" class="brand"><span class="dot">f</span> finkap</a>
    <span class="h1">· Banco de grano</span>
    <span class="spacer"></span>
    <span class="stat"><b id="cnt">0</b> fotos</span>
    <a class="btn ghost sm" href="panel-pedidos.html">Pedidos →</a>
    <button class="btn ghost sm" onclick="load()">↻ Actualizar</button>
    <button class="btn ghost sm" onclick="doLogout()">Salir</button>
  </div>
  <div class="toolbar"><div class="chips" id="chips"></div></div>
  <div class="grid" id="grid"></div>
</div>

<div class="mask" id="zoom" onclick="this.classList.remove('show')"><img id="zoomImg" alt=""></div>
<div class="toast" id="toast"></div>

<script>
const SB=window.FINKAP_SB;
const $=id=>document.getElementById(id);
let TOKEN=sessionStorage.getItem("finkap_pedidos_tok")||null;
let FOTOS=[], FILTER="todos", signedCache={};

const fmtUSD=n=>n==null?"—":"USD "+(+n).toLocaleString("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2});
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200);}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}

/* ---- AUTH ---- */
// access_token en sessionStorage (sesión); refresh_token en localStorage (equipo recordado). Compartido con panel-pedidos.
const RKEY="finkap_pedidos_refresh";
function saveSession(j,remember){
  TOKEN=j.access_token; sessionStorage.setItem("finkap_pedidos_tok",TOKEN);
  if(remember && j.refresh_token){ try{ localStorage.setItem(RKEY,j.refresh_token); }catch(e){} }
}
async function doLogin(){
  const email=$("liMail").value.trim(), password=$("liPass").value;
  if(!email||!password){ $("liErr").textContent="Completá email y contraseña."; return; }
  const btn=$("liBtn"); btn.disabled=true; btn.textContent="Entrando…"; $("liErr").textContent="";
  try{
    const r=await fetch(`${SB.url}/auth/v1/token?grant_type=password`,{
      method:"POST",headers:{"apikey":SB.key,"Content-Type":"application/json"},
      body:JSON.stringify({email,password})
    });
    const j=await r.json();
    if(!r.ok||!j.access_token) throw new Error(j.error_description||j.msg||j.error||"No se pudo entrar");
    saveSession(j, $("liRm") ? $("liRm").checked : true);
    showBank();
  }catch(e){ $("liErr").textContent=e.message; }
  finally{ btn.disabled=false; btn.textContent="Entrar"; }
}
async function refreshSession(){
  let rt=null; try{ rt=localStorage.getItem(RKEY); }catch(e){}
  if(!rt) return false;
  try{
    const r=await fetch(`${SB.url}/auth/v1/token?grant_type=refresh_token`,{
      method:"POST",headers:{"apikey":SB.key,"Content-Type":"application/json"},
      body:JSON.stringify({refresh_token:rt})
    });
    const j=await r.json();
    if(!r.ok||!j.access_token) return false;
    saveSession(j,true); return true;
  }catch(e){ return false; }
}
function doLogout(){ TOKEN=null; sessionStorage.removeItem("finkap_pedidos_tok"); try{ localStorage.removeItem(RKEY); }catch(e){} $("bankView").style.display="none"; $("loginView").style.display="block"; }
function showBank(){ $("loginView").style.display="none"; $("bankView").style.display="block"; load(); }

/* ---- DATA ---- */
async function load(_retried){
  try{
    const r=await fetch(`${SB.url}/rest/v1/fotos_grano?select=*&order=created_at.desc`,{
      headers:{"apikey":SB.key,"Authorization":"Bearer "+TOKEN}});
    if(r.status===401){
      if(!_retried && await refreshSession()) return load(true);
      doLogout(); throw new Error("Sesión vencida");
    }
    if(!r.ok) throw new Error("Error "+r.status);
    FOTOS=await r.json();
    render();
  }catch(e){ toast(e.message); }
}
async function signedUrl(path){
  if(signedCache[path]) return signedCache[path];
  const r=await fetch(`${SB.url}/storage/v1/object/sign/fotos-grano/${path}`,{
    method:"POST",headers:{"apikey":SB.key,"Authorization":"Bearer "+TOKEN,"Content-Type":"application/json"},
    body:JSON.stringify({expiresIn:3600})});
  if(!r.ok) return null;
  const j=await r.json();
  const u=SB.url+"/storage/v1"+j.signedURL;
  signedCache[path]=u; return u;
}

/* ---- RENDER ---- */
function render(){
  $("cnt").textContent=FOTOS.length;
  const origenes=[...new Set(FOTOS.map(f=>f.origen).filter(Boolean))].sort();
  $("chips").innerHTML=[{k:"todos",t:"Todos"},...origenes.map(o=>({k:o,t:o}))].map(o=>
    `<div class="chip ${FILTER===o.k?'on':''}" onclick="setFilter('${esc(o.k)}')">${esc(o.t)}<span class="n">${o.k==='todos'?FOTOS.length:FOTOS.filter(f=>f.origen===o.k).length}</span></div>`).join("");
  const list=FILTER==="todos"?FOTOS:FOTOS.filter(f=>f.origen===FILTER);
  if(!list.length){ $("grid").innerHTML='<div class="empty">Todavía no hay fotos de grano. Cuando un productor certifica un lote con foto, aparece acá.</div>'; return; }
  $("grid").innerHTML=list.map(card).join("");
  list.forEach(f=>fillPhoto(f));
}
function setFilter(k){ FILTER=k; render(); }
function nivelClass(n){ return (n||'').replace(/\s+/g,'_').toLowerCase(); }
function card(f){
  const when=new Date(f.created_at).toLocaleString("es-AR",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});
  return `<div class="gc">
    <div class="gthumb" id="th-${f.id}" onclick="zoom('${f.id}')">
      <div class="ld">cargando foto…</div>
      ${f.nivel?`<span class="gbadge b-${nivelClass(f.nivel)}">${esc(f.nivel)}</span>`:""}
    </div>
    <div class="gbody">
      <div class="nm">${esc(f.lote||f.variedad||f.origen||"Lote")}</div>
      <div class="meta">${esc(f.origen||"")}${f.productor?" · "+esc(f.productor):""}</div>
      <div class="row"><span class="sc">${f.score!=null?(+f.score).toFixed(1):"—"} <small style="color:var(--muted2)">pts</small></span><span class="pr">${fmtUSD(f.precio)}/kg</span></div>
      <div class="when">${when}${f.sello?` · <span class="sello">#${esc(f.sello)}</span>`:""}</div>
    </div>
  </div>`;
}
async function fillPhoto(f){
  const th=$("th-"+f.id); if(!th) return;
  const u=await signedUrl(f.foto_path);
  if(!u){ const ld=th.querySelector('.ld'); if(ld)ld.textContent='foto no disponible'; return; }
  th.insertAdjacentHTML('afterbegin',`<div class="bg" style="background-image:url('${u}')"></div><img src="${u}" alt="${esc(f.lote||'')}">`);
  const ld=th.querySelector('.ld'); if(ld)ld.remove();
}
async function zoom(id){
  const f=FOTOS.find(x=>x.id===id); if(!f)return;
  const u=await signedUrl(f.foto_path); if(!u){ toast("Foto no disponible"); return; }
  $("zoomImg").src=u; $("zoom").classList.add("show");
}

/* ---- INIT ---- */
(async function(){
  if(TOKEN){ showBank(); return; }
  if(await refreshSession()){ showBank(); return; }  // equipo recordado: renovar sin pedir clave
  $("loginView").style.display="block";
})();
</script>
</body>
</html>
